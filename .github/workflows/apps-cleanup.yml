name: Apps cleanup

on:
  pull_request:
    types: [closed]
    paths:
      - 'apps/**'

jobs:
  detect:
    name: Detect touched apps
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.detect.outputs.apps }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Detect touched apps
        id: detect
        run: |
          range="${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}"
          apps=$(git diff --name-only "$range" -- apps | cut -d/ -f2 | sort -u)
          json=$(printf '%s\n' "$apps" | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "apps=$json" >> "$GITHUB_OUTPUT"
          echo "Touched apps: $json"

  cleanup:
    name: Delete ${{ matrix.app }} PR workspace
    needs: detect
    if: needs.detect.outputs.apps != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJSON(needs.detect.outputs.apps) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Compute workspace name
        id: workspace
        run: |
          raw="pr${{ github.event.pull_request.number }}-${{ matrix.app }}"
          echo "name=${raw:0:19}" >> "$GITHUB_OUTPUT"

      - name: Log credential source
        run: |
          echo "Using credentials from https://developer.adobe.com/console/projects/${{ vars.AIO_ORG_ID }}/${{ vars.AIO_PROJECT_ID }}/workspaces/${{ vars.AIO_WORKSPACE_ID }}/details"

      - name: Delete App Builder workspace
        run: node scripts/delete-app-builder-workspace.js
        env:
          AIO_ORG_ID: ${{ vars.AIO_ORG_ID }}
          AIO_PROJECT_ID: ${{ vars.AIO_PROJECT_ID }}
          AIO_WORKSPACE_ID: ${{ vars.AIO_WORKSPACE_ID }}
          AIO_WORKSPACE_IMS_OAUTH_S2S_CLIENT_ID: ${{ secrets.AIO_WORKSPACE_IMS_OAUTH_S2S_CLIENT_ID }}
          AIO_WORKSPACE_IMS_OAUTH_S2S_CLIENT_SECRET: ${{ secrets.AIO_WORKSPACE_IMS_OAUTH_S2S_CLIENT_SECRET }}
          AIO_WORKSPACE_IMS_OAUTH_S2S_ORG_ID: ${{ secrets.AIO_WORKSPACE_IMS_OAUTH_S2S_ORG_ID }}
          AIO_WORKSPACE_IMS_OAUTH_S2S_SCOPES: ${{ secrets.AIO_WORKSPACE_IMS_OAUTH_S2S_SCOPES }}
          APP_WORKSPACE_NAME: ${{ steps.workspace.outputs.name }}
