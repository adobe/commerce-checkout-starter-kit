name: Apps retest

on:
  issue_comment:
    types: [created]

jobs:
  retest:
    name: Retest
    if: >
      github.event.issue.pull_request != null &&
      startsWith(github.event.comment.body, '/retest') &&
      contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association)
    runs-on: ubuntu-latest
    permissions:
      actions: write
      issues: write
      pull-requests: read
    steps:
      - name: React to comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions" \
            -f content=+1

      - name: Trigger Apps CI on the PR's branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ref="$(gh pr view "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --json headRefName -q .headRefName)"
          gh workflow run apps-ci.yml --repo "${{ github.repository }}" --ref "$ref" \
            -f pr_number="${{ github.event.issue.number }}"
