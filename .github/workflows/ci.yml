name: Node CI Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  test:
    name: CI check
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      matrix:
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Use Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - run: npm run code:check
      - run: npm test

  detect:
    name: Detect changed apps
    needs: test
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.detect.outputs.apps }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Detect changed apps
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            range="${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}"
          else
            range="${{ github.event.before }}..${{ github.sha }}"
          fi
          apps=$(git diff --name-only "$range" -- apps | cut -d/ -f2 | sort -u)
          json=$(printf '%s\n' "$apps" | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "apps=$json" >> "$GITHUB_OUTPUT"
          echo "Changed apps: $json"

  pipeline:
    name: ${{ matrix.app }}
    needs: detect
    if: needs.detect.outputs.apps != '[]'
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJSON(needs.detect.outputs.apps) }}
    uses: ./.github/workflows/apps-pipeline.yml
    with:
      app: ${{ matrix.app }}
      pr_number: ${{ github.event_name == 'pull_request' && github.event.pull_request.number || '' }}
    secrets: inherit
