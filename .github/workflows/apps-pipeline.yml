name: App pipeline

on:
  workflow_call:
    inputs:
      app:
        description: Name of the apps/<app> directory to check, test, and deploy
        required: true
        type: string
      pr_number:
        description: PR number this run is for - non-empty means deploy to the pr workspace, empty means main
        required: false
        type: string
        default: ''

jobs:
  check:
    name: check & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/${{ inputs.app }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Use Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: apps/${{ inputs.app }}/package-lock.json

      - name: Install app dependencies
        run: npm ci

      - name: Check
        run: npm run code:check

      - name: Test
        run: npm test

  deploy:
    name: deploy
    needs: check
    concurrency:
      group: deploy-${{ inputs.app }}-${{ inputs.pr_number != '' && 'pr' || 'main' }}
      queue: max
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/${{ inputs.app }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Use Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: apps/${{ inputs.app }}/package-lock.json

      - name: Install app dependencies
        run: npm ci

      # GitHub Actions can't build a secret name from `inputs.app` (`secrets.*`
      # requires a literal name), so every app's two secrets are listed here
      # explicitly; scripts/prepare-workspace-config.js picks the right one
      # for this run and flattens it into the env vars later steps need.
      # Onboarding a new app means adding its AIO_<APP>_MAIN/PR_WORKSPACE_CONFIG
      # secrets and a matching pair of lines here (or migrating to one GitHub
      # Environment per app/purpose if this list gets unwieldy). See
      # MAINTAINERS.md.
      - name: Load workspace config
        env:
          PURPOSE: ${{ inputs.pr_number != '' && 'PR' || 'MAIN' }}
          APP: ${{ inputs.app }}
          SHIPPING_METHOD_MAIN: ${{ secrets.AIO_SHIPPING_METHOD_MAIN_WORKSPACE_CONFIG }}
          SHIPPING_METHOD_PR: ${{ secrets.AIO_SHIPPING_METHOD_PR_WORKSPACE_CONFIG }}
          PAYMENT_METHOD_MAIN: ${{ secrets.AIO_PAYMENT_METHOD_MAIN_WORKSPACE_CONFIG }}
          PAYMENT_METHOD_PR: ${{ secrets.AIO_PAYMENT_METHOD_PR_WORKSPACE_CONFIG }}
          TAX_INTEGRATION_MAIN: ${{ secrets.AIO_TAX_INTEGRATION_MAIN_WORKSPACE_CONFIG }}
          TAX_INTEGRATION_PR: ${{ secrets.AIO_TAX_INTEGRATION_PR_WORKSPACE_CONFIG }}
          TOTALS_COLLECTOR_MAIN: ${{ secrets.AIO_TOTALS_COLLECTOR_MAIN_WORKSPACE_CONFIG }}
          TOTALS_COLLECTOR_PR: ${{ secrets.AIO_TOTALS_COLLECTOR_PR_WORKSPACE_CONFIG }}
        working-directory: .
        run: node scripts/prepare-workspace-config.js

      - name: Log deploy target
        run: |
          echo "Deploying ${{ inputs.app }} (${{ inputs.pr_number != '' && format('pr #{0}', inputs.pr_number) || 'main' }}) to workspace ${{ env.AIO_PROJECT_WORKSPACE_NAME }}: https://developer.adobe.com/console/projects/${{ env.AIO_PROJECT_ORG_ID }}/${{ env.AIO_PROJECT_ID }}/workspaces/${{ env.AIO_PROJECT_WORKSPACE_ID }}/details"

      - name: Setup AIO CLI
        uses: adobe/aio-cli-setup-action@5a7a7313f7024283e7eb384dc79b69b02effb307 # 1.3.0
        with:
          os: ubuntu-latest
          version: 11.x.x

      - name: Authenticate with OAuth Server-to-Server
        uses: adobe/aio-apps-action@6d7fdea67de9ef5ee3bf4c730aeaa5eaa7e2c533 # 4.1.0
        with:
          os: ubuntu-latest
          command: oauth_sts
          CLIENTID: ${{ env.CLIENTID }}
          CLIENTSECRET: ${{ env.CLIENTSECRET }}
          TECHNICALACCOUNTID: ${{ env.TECHNICALACCOUNTID }}
          TECHNICALACCOUNTEMAIL: ${{ env.TECHNICALACCOUNTEMAIL }}
          IMSORGID: ${{ env.IMSORGID }}
          SCOPES: ${{ env.SCOPES }}

      # adobe/aio-apps-action shells out with no cwd override, so it always
      # runs from GITHUB_WORKSPACE regardless of this job's working-directory
      # default (that default only applies to `run:` steps). Running `aio`
      # directly here keeps build/deploy scoped to apps/${{ inputs.app }}.
      - name: Build
        run: aio app build

      - name: Deploy
        run: aio app deploy --no-build

      # The pr workspace is shared across every PR touching this app, so a
      # successful deploy here is a smoke test, not a lasting preview: undeploy
      # immediately after to keep the shared workspace clean for the next PR's
      # run. The main workspace is the persistent target, so it's left deployed.
      # Runs even if Deploy partially failed (always()), so a bad deploy can't
      # leave the shared workspace dirty for the next PR; continue-on-error
      # since there may be nothing to undeploy in that case.
      - name: Undeploy
        if: always() && inputs.pr_number != ''
        continue-on-error: true
        run: aio app undeploy
