name: App pipeline

on:
  workflow_call:
    inputs:
      app:
        description: Name of the apps/<app> directory to check, test, and deploy
        required: true
        type: string

jobs:
  check:
    name: check & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/${{ inputs.app }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: apps/${{ inputs.app }}/package-lock.json

      - name: Install app dependencies
        run: npm ci

      - name: Check
        run: npm run code:check

      - name: Test
        run: npm test

  deploy:
    name: deploy
    needs: check
    concurrency:
      group: deploy-${{ inputs.app }}-${{ github.event_name == 'pull_request' && 'pr' || 'main' }}
      queue: max
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/${{ inputs.app }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: apps/${{ inputs.app }}/package-lock.json

      - name: Install app dependencies
        run: npm ci

      # GitHub Actions can't build a secret name from `inputs.app` (`secrets.*`
      # requires a literal name), so every app's two secrets are listed here
      # explicitly and selected via indirect variable expansion below.
      # Onboarding a new app means adding its AIO_<APP>_MAIN/PR_WORKSPACE_CONFIG
      # secrets and a matching pair of lines here (or migrating to one GitHub
      # Environment per app/purpose if this list gets unwieldy). See
      # MAINTAINERS.md.
      - name: Load workspace config
        env:
          PURPOSE: ${{ github.event_name == 'pull_request' && 'PR' || 'MAIN' }}
          APP: ${{ inputs.app }}
          SHIPPING_METHOD_MAIN: ${{ secrets.AIO_SHIPPING_METHOD_MAIN_WORKSPACE_CONFIG }}
          SHIPPING_METHOD_PR: ${{ secrets.AIO_SHIPPING_METHOD_PR_WORKSPACE_CONFIG }}
          PAYMENT_METHOD_MAIN: ${{ secrets.AIO_PAYMENT_METHOD_MAIN_WORKSPACE_CONFIG }}
          PAYMENT_METHOD_PR: ${{ secrets.AIO_PAYMENT_METHOD_PR_WORKSPACE_CONFIG }}
          TAX_INTEGRATION_MAIN: ${{ secrets.AIO_TAX_INTEGRATION_MAIN_WORKSPACE_CONFIG }}
          TAX_INTEGRATION_PR: ${{ secrets.AIO_TAX_INTEGRATION_PR_WORKSPACE_CONFIG }}
          TOTALS_COLLECTOR_MAIN: ${{ secrets.AIO_TOTALS_COLLECTOR_MAIN_WORKSPACE_CONFIG }}
          TOTALS_COLLECTOR_PR: ${{ secrets.AIO_TOTALS_COLLECTOR_PR_WORKSPACE_CONFIG }}
        run: |
          var_name="$(echo "$APP" | tr '[:lower:]-' '[:upper:]_')_${PURPOSE}"
          RAW_WORKSPACE_JSON="${!var_name}"

          if [ -z "$RAW_WORKSPACE_JSON" ]; then
            echo "No workspace config secret set for $APP ($PURPOSE). Expected env var $var_name to be non-empty." >&2
            exit 1
          fi

          # The secret holds the *raw* console workspace.json exactly as downloaded
          # from the "Download" button on the workspace's page in
          # https://developer.adobe.com/console/ — no `aio` CLI step required to
          # produce it. Pull each field out directly (see MAINTAINERS.md for the
          # schema and where each value lives in that file).
          CRED="$(jq '(.project.workspace.details.credentials // []) | map(select(.integration_type == "oauth_server_to_server")) | (.[0].oauth_server_to_server // {})' <<< "$RAW_WORKSPACE_JSON")"
          RUNTIME="$(jq '(.project.workspace.details.runtime.namespaces // [])[0] // {}' <<< "$RAW_WORKSPACE_JSON")"

          CLIENTID="$(jq -r '.client_id // empty' <<< "$CRED")"
          CLIENTSECRET="$(jq -r '.client_secrets[0] // empty' <<< "$CRED")"
          TECHNICALACCOUNTID="$(jq -r '.technical_account_id // empty' <<< "$CRED")"
          TECHNICALACCOUNTEMAIL="$(jq -r '.technical_account_email // empty' <<< "$CRED")"
          IMSORGID="$(jq -r '.project.org.ims_org_id // empty' <<< "$RAW_WORKSPACE_JSON")"
          SCOPES="$(jq -c '.scopes // []' <<< "$CRED")"
          AIO_RUNTIME_NAMESPACE="$(jq -r '.name // empty' <<< "$RUNTIME")"
          AIO_RUNTIME_AUTH="$(jq -r '.auth // empty' <<< "$RUNTIME")"
          AIO_PROJECT_ID="$(jq -r '.project.id // empty' <<< "$RAW_WORKSPACE_JSON")"
          AIO_PROJECT_NAME="$(jq -r '.project.name // empty' <<< "$RAW_WORKSPACE_JSON")"
          AIO_PROJECT_ORG_ID="$(jq -r '.project.org.id // empty' <<< "$RAW_WORKSPACE_JSON")"
          AIO_PROJECT_WORKSPACE_ID="$(jq -r '.project.workspace.id // empty' <<< "$RAW_WORKSPACE_JSON")"
          AIO_PROJECT_WORKSPACE_NAME="$(jq -r '.project.workspace.name // empty' <<< "$RAW_WORKSPACE_JSON")"
          AIO_PROJECT_WORKSPACE_DETAILS_SERVICES="$(jq -c '.project.workspace.details.services // []' <<< "$RAW_WORKSPACE_JSON")"

          if [ -z "$CLIENTID" ] || [ -z "$CLIENTSECRET" ] || [ -z "$TECHNICALACCOUNTID" ] || \
             [ -z "$TECHNICALACCOUNTEMAIL" ] || [ -z "$IMSORGID" ] || \
             [ -z "$AIO_RUNTIME_NAMESPACE" ] || [ -z "$AIO_RUNTIME_AUTH" ] || \
             [ -z "$AIO_PROJECT_ID" ] || [ -z "$AIO_PROJECT_NAME" ] || [ -z "$AIO_PROJECT_ORG_ID" ] || \
             [ -z "$AIO_PROJECT_WORKSPACE_ID" ] || [ -z "$AIO_PROJECT_WORKSPACE_NAME" ]; then
            echo "Workspace config for $APP ($PURPOSE) is missing one or more required fields." >&2
            exit 1
          fi

          echo "::add-mask::$CLIENTID"
          echo "CLIENTID=$CLIENTID" >> "$GITHUB_ENV"
          echo "::add-mask::$CLIENTSECRET"
          echo "CLIENTSECRET=$CLIENTSECRET" >> "$GITHUB_ENV"
          echo "::add-mask::$TECHNICALACCOUNTID"
          echo "TECHNICALACCOUNTID=$TECHNICALACCOUNTID" >> "$GITHUB_ENV"
          echo "::add-mask::$TECHNICALACCOUNTEMAIL"
          echo "TECHNICALACCOUNTEMAIL=$TECHNICALACCOUNTEMAIL" >> "$GITHUB_ENV"
          echo "::add-mask::$IMSORGID"
          echo "IMSORGID=$IMSORGID" >> "$GITHUB_ENV"
          echo "::add-mask::$SCOPES"
          echo "SCOPES=$SCOPES" >> "$GITHUB_ENV"
          echo "::add-mask::$AIO_RUNTIME_NAMESPACE"
          echo "AIO_RUNTIME_NAMESPACE=$AIO_RUNTIME_NAMESPACE" >> "$GITHUB_ENV"
          echo "::add-mask::$AIO_RUNTIME_AUTH"
          echo "AIO_RUNTIME_AUTH=$AIO_RUNTIME_AUTH" >> "$GITHUB_ENV"
          echo "::add-mask::$AIO_PROJECT_ID"
          echo "AIO_PROJECT_ID=$AIO_PROJECT_ID" >> "$GITHUB_ENV"
          echo "::add-mask::$AIO_PROJECT_NAME"
          echo "AIO_PROJECT_NAME=$AIO_PROJECT_NAME" >> "$GITHUB_ENV"
          echo "::add-mask::$AIO_PROJECT_ORG_ID"
          echo "AIO_PROJECT_ORG_ID=$AIO_PROJECT_ORG_ID" >> "$GITHUB_ENV"
          echo "::add-mask::$AIO_PROJECT_WORKSPACE_ID"
          echo "AIO_PROJECT_WORKSPACE_ID=$AIO_PROJECT_WORKSPACE_ID" >> "$GITHUB_ENV"
          echo "::add-mask::$AIO_PROJECT_WORKSPACE_NAME"
          echo "AIO_PROJECT_WORKSPACE_NAME=$AIO_PROJECT_WORKSPACE_NAME" >> "$GITHUB_ENV"
          echo "::add-mask::$AIO_PROJECT_WORKSPACE_DETAILS_SERVICES"
          echo "AIO_PROJECT_WORKSPACE_DETAILS_SERVICES=$AIO_PROJECT_WORKSPACE_DETAILS_SERVICES" >> "$GITHUB_ENV"

      - name: Log deploy target
        run: |
          echo "Deploying ${{ inputs.app }} (${{ github.event_name == 'pull_request' && 'pr' || 'main' }}) to workspace ${{ env.AIO_PROJECT_WORKSPACE_NAME }} (org ${{ env.AIO_PROJECT_ORG_ID }}, project ${{ env.AIO_PROJECT_ID }})"

      - name: Setup AIO CLI
        uses: adobe/aio-cli-setup-action@5a7a7313f7024283e7eb384dc79b69b02effb307 # 1.3.0
        with:
          os: ubuntu-latest
          version: 11.x.x

      - name: Authenticate with OAuth Server-to-Server
        uses: adobe/aio-apps-action@6d7fdea67de9ef5ee3bf4c730aeaa5eaa7e2c533 # 4.1.0
        with:
          os: ubuntu-latest
          command: oauth_sts
          CLIENTID: ${{ env.CLIENTID }}
          CLIENTSECRET: ${{ env.CLIENTSECRET }}
          TECHNICALACCOUNTID: ${{ env.TECHNICALACCOUNTID }}
          TECHNICALACCOUNTEMAIL: ${{ env.TECHNICALACCOUNTEMAIL }}
          IMSORGID: ${{ env.IMSORGID }}
          SCOPES: ${{ env.SCOPES }}

      - name: Build
        uses: adobe/aio-apps-action@6d7fdea67de9ef5ee3bf4c730aeaa5eaa7e2c533 # 4.1.0
        with:
          os: ubuntu-latest
          command: build

      - name: Deploy
        uses: adobe/aio-apps-action@6d7fdea67de9ef5ee3bf4c730aeaa5eaa7e2c533 # 4.1.0
        with:
          os: ubuntu-latest
          command: deploy
