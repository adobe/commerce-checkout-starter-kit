name: App pipeline

on:
  workflow_call:
    inputs:
      app:
        description: Name of the apps/<app> directory to check, test, and deploy
        required: true
        type: string

jobs:
  pipeline:
    name: check, test & deploy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/${{ inputs.app }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: apps/${{ inputs.app }}/package-lock.json

      - name: Install app dependencies
        run: npm ci

      - name: Check
        run: npm run code:check

      - name: Test
        run: npm test

      - name: Setup AIO CLI
        uses: adobe/aio-cli-setup-action@5a7a7313f7024283e7eb384dc79b69b02effb307 # 1.3.0
        with:
          os: ubuntu-latest
          version: 11.x.x

      - name: Authenticate with OAuth Server-to-Server
        uses: adobe/aio-apps-action@6d7fdea67de9ef5ee3bf4c730aeaa5eaa7e2c533 # 4.1.0
        with:
          os: ubuntu-latest
          command: oauth_sts
          CLIENTID: ${{ secrets.CLIENTID }}
          CLIENTSECRET: ${{ secrets.CLIENTSECRET }}
          TECHNICALACCOUNTID: ${{ secrets.TECHNICALACCID }}
          TECHNICALACCOUNTEMAIL: ${{ secrets.TECHNICALACCEMAIL }}
          IMSORGID: ${{ secrets.IMSORGID }}
          SCOPES: ${{ secrets.SCOPES }}

      - name: Select org & project
        run: |
          aio console org select "${{ vars.AIO_ORG_ID }}"
          aio console project select "${{ vars.AIO_PROJECT_ID }}"

      - name: Compute workspace name
        id: workspace
        run: |
          app="${{ inputs.app }}"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            raw="pr${{ github.event.pull_request.number }}-${app}"
            title="PR #${{ github.event.pull_request.number }} - ${app}"
          else
            raw="main-${app}"
            title="main - ${app}"
          fi
          echo "name=${raw:0:19}" >> "$GITHUB_OUTPUT"
          echo "title=$title" >> "$GITHUB_OUTPUT"

      - name: Install root dependencies
        working-directory: .
        run: npm ci

      - name: Ensure App Builder workspace
        working-directory: .
        run: node scripts/ensure-app-builder-workspace.js
        env:
          CLIENTID: ${{ secrets.CLIENTID }}
          CLIENTSECRET: ${{ secrets.CLIENTSECRET }}
          IMSORGID: ${{ secrets.IMSORGID }}
          SCOPES: ${{ secrets.SCOPES }}
          AIO_ORG_ID: ${{ vars.AIO_ORG_ID }}
          AIO_PROJECT_ID: ${{ vars.AIO_PROJECT_ID }}
          WORKSPACE_NAME: ${{ steps.workspace.outputs.name }}
          WORKSPACE_TITLE: ${{ steps.workspace.outputs.title }}
          APP_DIR: apps/${{ inputs.app }}

      - name: Select workspace
        run: aio console workspace select "${{ steps.workspace.outputs.name }}"

      - name: Import Console config
        run: aio app use --global --no-input

      - name: Deploy
        run: aio app deploy
